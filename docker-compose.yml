services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    env_file: .env
    environment:
      - CHROMA_URL=http://chromadb:8000
      - DATA_DIR=/app/data
      - DATABASE_URL=postgres://llmkb:llmkb@postgres:5432/llmkb
      - PORT=3000
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
    depends_on:
      chromadb:
        condition: service_healthy
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: llmkb
      POSTGRES_PASSWORD: llmkb
      POSTGRES_DB: llmkb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llmkb"]
      interval: 3s
      timeout: 3s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "${CHROMA_PORT:-8930}:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo -e \"GET /api/v2/heartbeat HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" > /dev/tcp/localhost/8000'"]
      interval: 5s
      timeout: 5s
      retries: 5

  test:
    build: .
    entrypoint: ["npx", "vitest", "run"]
    environment:
      - CHROMA_URL=http://chromadb:8000
      - DATA_DIR=/app/data
      - LLM_PROVIDER=claude
    depends_on:
      chromadb:
        condition: service_healthy
    profiles:
      - test

volumes:
  postgres_data:
  chroma_data:
